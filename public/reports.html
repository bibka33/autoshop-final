<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчётность | Автостиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            margin-bottom: 5px;
            color: #7f8c8d;
            font-size: 12px;
            font-weight: 600;
        }
        
        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        
        .btn-excel {
            background: #27ae60;
        }
        
        .btn-excel:hover {
            background: #219653;
        }
        
        .orders-table {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #34495e;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending {
            background: #3498db;
            color: white;
        }
        
        .status-cancelled {
            background: #e74c3c;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }
        
        .total-amount {
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Отчётность магазина "Автостиль"</h1>
        <p>Управление заказами и экспорт данных в Excel</p>
    </div>
    
    <div class="stats" id="stats">
        <div class="stat-card">
            <h3>Всего заказов</h3>
            <div class="value" id="totalOrders">-</div>
        </div>
        <div class="stat-card">
            <h3>Общая выручка</h3>
            <div class="value" id="totalRevenue">- ₽</div>
        </div>
    </div>
    
    <div class="filters">
        <div class="filter-group">
            <label>📅 Дата с</label>
            <input type="date" id="startDate">
        </div>
        <div class="filter-group">
            <label>📅 Дата по</label>
            <input type="date" id="endDate">
        </div>
        <div class="filter-group">
            <button onclick="loadOrders()">🔍 Применить фильтр</button>
        </div>
        <div class="filter-group">
            <button onclick="exportToExcel()" class="btn-excel">📊 Экспорт в Excel</button>
        </div>
        <div class="filter-group">
            <button onclick="loadAllOrders()">🔄 Показать все</button>
        </div>
    </div>
    
    <div class="orders-table">
        <table id="ordersTable">
            <thead>
                <tr>
                    <th>ID заказа</th>
                    <th>Дата заказа</th>
                    <th>Дата доставки</th>
                    <th>Email клиента</th>
                    <th>Телефон</th>
                    <th>Пункт выдачи</th>
                    <th>Способ оплаты</th>
                    <th>Сумма</th>
                    <th>Статус</th>
                    <th>Товары</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                <tr>
                    <td colspan="10" style="text-align: center;">Загрузка данных...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let currentOrders = [];
    
    async function loadStats() {
        try {
            const response = await fetch('/api/stats');
            const stats = await response.json();
            document.getElementById('totalOrders').textContent = stats.total_orders || 0;
            document.getElementById('totalRevenue').textContent = (stats.total_revenue || 0) + ' ₽';
        } catch (error) {
            console.error('Ошибка загрузки статистики:', error);
        }
    }
    
    async function loadAllOrders() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        await loadOrders();
    }
    
    async function loadOrders() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        
        try {
            let url = '/api/all-orders';
            const response = await fetch(url);
            const orders = await response.json();
            currentOrders = orders;
            displayOrders(orders);
            await loadStats();
        } catch (error) {
            console.error('Ошибка загрузки заказов:', error);
            document.getElementById('ordersBody').innerHTML = `
                <tr><td colspan="10" style="text-align: center; color: red;">
                    ⚠️ Ошибка подключения к серверу. Убедитесь, что сервер запущен.
                </td></tr>
            `;
        }
    }
    
    function displayOrders(orders) {
        const tbody = document.getElementById('ordersBody');
        
        if (!orders || orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align: center;">Нет заказов</td></tr>';
            return;
        }
        
        tbody.innerHTML = orders.map(order => {
            let itemsText = '';
            try {
                const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
                itemsText = items.map(item => `${item.name} (${item.price}₽)`).join(', ');
            } catch(e) {
                itemsText = order.items || '-';
            }
            
            const statusClass = order.status === 'cancelled' ? 'status-cancelled' : 'status-pending';
            const statusText = order.status === 'cancelled' ? 'Отменён' : 'Активен';
            
            return `
                <tr>
                    <td>#${order.id}</td>
                    <td>${new Date(order.order_date).toLocaleString('ru-RU')}</td>
                    <td>${order.delivery_date ? new Date(order.delivery_date).toLocaleDateString('ru-RU') : '-'}</td>
                    <td>${order.user_email}</td>
                    <td>${order.user_phone}</td>
                    <td>${order.pickup_point}</td>
                    <td>${order.payment_method}</td>
                    <td class="total-amount">${order.total} ₽</td>
                    <td><span class="status ${statusClass}">${statusText}</span></td>
                    <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;">${itemsText}</td>
                </tr>
            `;
        }).join('');
    }
    
    async function exportToExcel() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        
        let url = '/api/export-excel';
        if (startDate && endDate) {
            url += `?startDate=${startDate}&endDate=${endDate}`;
        }
        
        try {
            window.open(url, '_blank');
        } catch (error) {
            alert('Ошибка экспорта: ' + error.message);
        }
    }
    
    loadOrders();
</script>
</body>
</html>
